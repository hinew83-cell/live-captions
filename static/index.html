<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiveCaptions - 실시간 PC 오디오 자막기</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Stylesheet -->
    <link rel="stylesheet" href="index.css">
</head>
<body class="dark-theme">
    <div class="app-container">
        <!-- Sidebar / Settings Control -->
        <aside class="sidebar">
            <div class="brand">
                <i class="fa-solid fa-waveform-lines brand-icon"></i>
                <h1>LiveCaptions</h1>
            </div>
            
            <div class="control-group">
                <label for="device-select"><i class="fa-solid fa-volume-high"></i> 오디오 장치 선택</label>
                <div class="select-wrapper">
                    <select id="device-select">
                        <option value="">장치 검색 중...</option>
                    </select>
                </div>
            </div>

            <div class="control-group">
                <label for="language-select"><i class="fa-solid fa-language"></i> 언어 설정</label>
                <div class="select-wrapper">
                    <select id="language-select">
                        <option value="ko-KR">한국어 (Korean)</option>
                        <option value="en-US">English (US)</option>
                        <option value="ja-JP">日本語 (Japanese)</option>
                        <option value="zh-CN">简体中文 (Chinese)</option>
                        <option value="es-ES">Español (Spanish)</option>
                    </select>
                </div>
            </div>



            <div class="control-group">
                <label><i class="fa-solid fa-sliders"></i> 실시간 자막 제어</label>
                <div class="button-row">
                    <button id="start-btn" class="btn btn-primary">
                        <i class="fa-solid fa-play"></i> 시작
                    </button>
                    <button id="stop-btn" class="btn btn-danger" disabled>
                        <i class="fa-solid fa-stop"></i> 중지
                    </button>
                </div>
            </div>

            <div class="control-group settings-details">
                <div class="status-indicator">
                    <span class="status-dot" id="status-dot"></span>
                    <span id="status-text">대기 중</span>
                </div>
            </div>

            <div class="sidebar-footer">
                <button id="float-mode-btn" class="btn btn-secondary btn-full">
                    <i class="fa-solid fa-expand"></i> 플로팅 모드 전환
                </button>
            </div>
        </aside>

        <!-- Main Workspace -->
        <main class="main-content">
            <!-- Top bar / Waveform Visualizer -->
            <header class="header">
                <div class="visualizer-container">
                    <canvas id="waveform-canvas"></canvas>
                    <div class="audio-state-text" id="audio-amplitude">오디오 신호 없음</div>
                </div>
            </header>

            <!-- Workspace Body: Left-Right Split (6:4 Ratio) -->
            <div class="workspace-body">
                <!-- Real-time Caption Feed Card (Left, 60%) -->
                <section class="display-section">
                    <div class="caption-container glass-card" id="caption-box">
                        <div class="caption-header">
                            <h2><i class="fa-solid fa-waveform-lines"></i> 실시간 자막 Feed (다시듣기 지원)</h2>
                            <div class="caption-actions">
                                <button id="clear-caption-btn" title="비우기"><i class="fa-solid fa-trash-can"></i></button>
                                <button id="font-increase-btn" title="크게"><i class="fa-solid fa-magnifying-glass-plus"></i></button>
                                <button id="font-decrease-btn" title="작게"><i class="fa-solid fa-magnifying-glass-minus"></i></button>
                            </div>
                        </div>
                        <div class="caption-body" id="caption-body">
                            <div class="caption-placeholder">
                                <i class="fa-solid fa-microphone-lines-slash"></i>
                                <p>오디오 장치를 선택하고 시작 버튼을 누르면 실시간 자막이 여기에 표시됩니다.</p>
                            </div>
                        </div>
                    </div>
                </section>

                <!-- Transcript History / Logs (Right, 40% - Easy Copy/Download) -->
                <section class="history-section">
                    <div class="history-card glass-card">
                        <div class="history-header">
                            <h2><i class="fa-solid fa-clock-rotate-left"></i> 텍스트 기록 히스토리 (드래그/복사용)</h2>
                            <div class="history-actions">
                                <button id="copy-history-btn" class="btn btn-icon-text" title="전체 복사">
                                    <i class="fa-solid fa-copy"></i> 복사
                                </button>
                                <button id="download-history-btn" class="btn btn-icon-text" title="텍스트 파일 저장">
                                    <i class="fa-solid fa-download"></i> 저장
                                </button>
                            </div>
                        </div>
                        <div class="history-list" id="history-list">
                            <div class="history-placeholder" style="color: var(--text-muted); text-align: center; padding: 2rem;">
                                추출된 텍스트가 순차적으로 기록되어 마우스로 복사하기 쉽도록 여기에 쌓입니다.
                            </div>
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <!-- Floating Overlay Mode (Initially Hidden) -->
    <div class="floating-overlay-mode" id="floating-overlay" style="display: none;">
        <div class="floating-handle">
            <span class="floating-title"><i class="fa-solid fa-waveform-lines"></i> LiveCaptions Overlay</span>
            <div class="floating-controls">
                <button id="close-float-btn" title="일반 모드 복귀"><i class="fa-solid fa-compress"></i></button>
            </div>
        </div>
        <div class="floating-text-container">
            <p id="floating-text">소리를 듣는 중입니다...</p>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
